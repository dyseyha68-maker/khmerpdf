<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Khmer PDF Tools{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --secondary: #64748b;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --surface: #ffffff;
            --surface-hover: #f1f5f9;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --radius-sm: 8px;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text);
        }
        
        .header {
            background: var(--surface);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }
        
        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }
        
        .nav-links {
            display: flex;
            gap: 4px;
        }
        
        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .nav-links a:hover {
            background: var(--surface-hover);
            color: var(--primary);
        }
        
        .nav-links a.active {
            background: var(--primary);
            color: white;
        }
        
        .lang-toggle {
            display: flex;
            background: var(--surface-hover);
            border-radius: var(--radius-sm);
            padding: 4px;
            gap: 4px;
        }
        
        .lang-toggle button {
            background: none;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .lang-toggle button.active {
            background: var(--surface);
            color: var(--primary);
            box-shadow: var(--shadow);
        }
        
        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            flex-direction: column;
            gap: 4px;
        }
        
        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
        }
        
        @media (max-width: 900px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--surface);
                flex-direction: column;
                padding: 16px;
                box-shadow: var(--shadow-md);
            }
            
            .nav-links.open {
                display: flex;
            }
            
            .hamburger {
                display: flex;
            }
        }
        
        .main-content {
            flex: 1;
            padding: 24px;
            display: flex;
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        .left-panel {
            width: 340px;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-md);
        }
        
        .right-panel {
            flex: 1;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .drop-zone:hover {
            border-color: var(--primary);
            background: #f8fafc;
        }
        
        .drop-zone-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            background: var(--primary-dark);
        }
        
        .action-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }
        
        .right-panel-inner {
            flex: 1;
            overflow-y: auto;
        }
        
        .page-grid, .image-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .page-item, .image-item {
            width: 180px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
        }
        
        .instructions {
            padding: 16px;
            background: #eff6ff;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            color: var(--primary);
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            padding: 32px;
            border-radius: var(--radius);
            text-align: center;
            min-width: 320px;
        }
        
        .progress-container {
            margin-top: 20px;
        }
        
        .progress-bar-bg {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }
        
        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
                padding: 16px;
            }
            
            .left-panel, .right-panel {
                width: 100%;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="/" class="logo">
                <div class="logo-icon">📄</div>
                <span class="logo-text">Damspey</span>
            </a>
        </div>
        
        <nav class="nav-links" id="navLinks">
            <a href="/">Tools</a>
            <a href="/compress/">Compress</a>
            <a href="/merge/">Merge</a>
            <a href="/split/">Split</a>
            <a href="/organize/">Organize</a>
            <a href="/calendar/">Calendar</a>
        </nav>
        
        <div class="lang-toggle">
            <button id="langEn" onclick="setLang('en')">EN</button>
            <button id="langKh" onclick="setLang('kh')">KH</button>
        </div>
        
        <button class="hamburger" onclick="toggleNav()">
            <span></span><span></span><span></span>
        </button>
    </header>
    
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Processing...</h2>
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <p><span id="progressPercent">0</span>%</p>
            </div>
        </div>
    </div>
    
    <script>
        function toggleNav() {
            document.getElementById('navLinks').classList.toggle('open');
        }
        
        let currentLang = localStorage.getItem('pdf_lang') || 'en';
        
        function setLang(lang) {
            currentLang = lang;
            if (lang === 'kh') {
                document.body.className = 'lang-kh';
                document.getElementById('langKh').classList.add('active');
                document.getElementById('langEn').classList.remove('active');
            } else {
                document.body.className = 'lang-en';
                document.getElementById('langEn').classList.add('active');
                document.getElementById('langKh').classList.remove('active');
            }
            localStorage.setItem('pdf_lang', lang);
            updateTexts();
        }
        
        function updateTexts() {
            document.querySelectorAll('.text-en').forEach(el => {
                el.style.display = currentLang === 'en' ? 'block' : 'none';
            });
            document.querySelectorAll('.text-kh').forEach(el => {
                el.style.display = currentLang === 'kh' ? 'block' : 'none';
            });
        }
        
        setLang(currentLang);
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
