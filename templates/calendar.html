{% extends 'base.html' %}

{% block title %}Cambodia Calendar - Khmer PDF Tools{% endblock %}

{% block extra_css %}
<style>
    .calendar-container {
        display: flex;
        gap: 20px;
        height: calc(100vh - 100px);
        padding: 20px;
    }
    
    .left-panel {
        width: 280px;
        background: white;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        display: flex;
        flex-direction: column;
    }
    
    .right-panel {
        flex: 1;
        background: white;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        display: flex;
        flex-direction: column;
    }
    
    .year-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 20px;
    }
    
    .year-nav button {
        background: #667eea;
        color: white;
        border: none;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .year-nav button:hover {
        background: #5568d3;
    }
    
    .year-nav span {
        font-size: 20px;
        font-weight: 600;
        min-width: 80px;
        text-align: center;
    }
    
    .month-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        margin-bottom: 20px;
    }
    
    .month-btn {
        padding: 10px 4px;
        background: #f5f5f5;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        font-family: 'Kantumruy Pro', sans-serif;
        transition: all 0.2s;
    }
    
    .month-btn:hover {
        background: #e0e0e0;
    }
    
    .month-btn.active {
        background: #d32f2f;
        color: white;
    }
    
    .holiday-section {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    
    .holiday-section h3 {
        font-size: 16px;
        color: #333;
        margin-bottom: 10px;
        flex-shrink: 0;
    }
    
    .holiday-list {
        flex: 1;
        overflow-y: auto;
    }
    
    .holiday-item {
        padding: 8px 12px;
        background: #ffcdd2;
        border-radius: 6px;
        margin-bottom: 6px;
        font-size: 13px;
        border-left: 3px solid #d32f2f;
    }
    
    .holiday-item .date {
        color: #d32f2f;
        font-weight: 600;
    }
    
    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
        flex: 1;
    }
    
    .day-header {
        text-align: center;
        padding: 8px;
        font-weight: 600;
        color: #666;
        font-size: 12px;
    }
    
    .calendar-day {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
        border-radius: 6px;
        padding: 4px;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .calendar-day:hover {
        background: #e0e0e0;
    }
    
    .calendar-day.today {
        background: #d32f2f;
        color: white;
    }
    
    .calendar-day.holiday {
        background: #ffcdd2;
        color: #c62828;
    }
    
    .calendar-day.saturday,
    .calendar-day.sunday {
        background: #ffebee;
        color: #c62828;
    }
    
    .day-number {
        font-size: 14px;
        font-weight: 600;
    }
    
    .khmer-day {
        font-size: 9px;
        color: #666;
        margin-top: 2px;
    }
    
    .calendar-day.today .khmer-day,
    .calendar-day.holiday .khmer-day,
    .calendar-day.saturday .khmer-day,
    .calendar-day.sunday .khmer-day {
        color: inherit;
    }
    
    .month-title {
        text-align: center;
        font-size: 20px;
        color: #333;
        margin-bottom: 15px;
        font-weight: 600;
    }
    
    @media (max-width: 900px) {
        .calendar-container { flex-direction: column; height: auto; }
        .left-panel, .right-panel { width: 100%; }
    }
    
    .lang-btn {
        background: white;
        border: 2px solid #667eea;
        color: #667eea;
        padding: 6px 12px;
        border-radius: 16px;
        cursor: pointer;
        font-weight: 600;
        font-family: 'Kantumruy Pro', sans-serif;
        margin-left: 5px;
    }
    
    .lang-btn.active {
        background: #667eea;
        color: white;
    }
</style>
{% endblock %}

{% block content %}
<div class="calendar-container">
    <div class="left-panel">
        <div class="year-nav">
            <button onclick="changeYear(-1)">◀</button>
            <span id="yearDisplay">{{ current_year }}</span>
            <button onclick="changeYear(1)">▶</button>
        </div>
        
        <div class="month-grid" id="monthGrid"></div>
        
        <div class="holiday-section">
            <h3>
                <span class="text-en">Holidays</span>
                <span class="text-kh">ថ្ងៃឈប់សម្រាក</span>
            </h3>
            <div class="holiday-list" id="holidayList"></div>
        </div>
    </div>
    
    <div class="right-panel">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
            <button class="lang-btn" id="langEn" onclick="setLang('en')">EN</button>
            <button class="lang-btn active" id="langKh" onclick="setLang('kh')">KH</button>
        </div>
        <div class="month-title" id="monthTitle"></div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>
</div>

<script>
    const khmerMonths = ['មករា', 'កុម្ភៈ', 'មីនា', 'មេសា', 'ឧសភា', 'មិថុនា', 'កក្កដា', 'សីហា', 'កញ្ញា', 'តុលា', 'វិចិ្ឆកា', 'ធ្នូ'];
    const englishMonths = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const khmerDays = ['ច', 'អ', 'ព', 'ព្រ', 'ស', 'សៅ', 'អា'];
    
    let holidays = {{ holidays }};
    
    let currentYear = {{ current_year }};
    let currentMonth = new Date().getMonth();
    
    function setLang(lang) {
        if (lang === 'kh') {
            document.body.className = 'lang-kh';
            document.getElementById('langKh').classList.add('active');
            document.getElementById('langEn').classList.remove('active');
        } else {
            document.body.className = 'lang-en';
            document.getElementById('langEn').classList.add('active');
            document.getElementById('langKh').classList.remove('active');
        }
        localStorage.setItem('pdf_lang', lang);
        render();
    }
    
    const savedLang = localStorage.getItem('pdf_lang') || 'kh';
    setLang(savedLang);
    
    function changeYear(delta) {
        currentYear += delta;
        document.getElementById('yearDisplay').textContent = currentYear;
        render();
    }
    
    function selectMonth(m) {
        currentMonth = m;
        render();
    }
    
    function render() {
        const grid = document.getElementById('calendarGrid');
        const monthGrid = document.getElementById('monthGrid');
        const holidayList = document.getElementById('holidayList');
        const monthTitle = document.getElementById('monthTitle');
        
        const isKh = document.body.classList.contains('lang-kh');
        
        monthTitle.textContent = (isKh ? khmerMonths[currentMonth] : englishMonths[currentMonth]) + ' ' + currentYear;
        
        grid.innerHTML = '';
        const headers = isKh ? ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] : ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        headers.forEach(day => {
            const div = document.createElement('div');
            div.className = 'day-header';
            div.textContent = day;
            grid.appendChild(div);
        });
        
        const firstOfMonth = new Date(currentYear, currentMonth, 1);
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        let startDay = firstOfMonth.getDay();
        startDay = startDay === 0 ? 6 : startDay - 1;
        
        const today = new Date();
        
        for (let i = 0; i < startDay + daysInMonth; i++) {
            const dayNum = i - startDay + 1;
            
            if (dayNum < 1 || dayNum > daysInMonth) {
                const empty = document.createElement('div');
                grid.appendChild(empty);
                continue;
            }
            
            const div = document.createElement('div');
            div.className = 'calendar-day';
            
            const dayOfWeek = new Date(currentYear, currentMonth, dayNum).getDay();
            const holiday = holidays.find(h => h.day === dayNum && h.month === currentMonth + 1);
            
            if (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === dayNum) {
                div.classList.add('today');
            } else if (holiday) {
                div.classList.add('holiday');
            } else if (dayOfWeek === 6 || dayOfWeek === 0) {
                div.classList.add(dayOfWeek === 6 ? 'saturday' : 'sunday');
            }
            
            div.innerHTML = '<span class="day-number">' + dayNum + '</span><span class="khmer-day">' + khmerDays[dayOfWeek] + '</span>';
            grid.appendChild(div);
        }
        
        monthGrid.innerHTML = '';
        khmerMonths.forEach((m, idx) => {
            const btn = document.createElement('button');
            btn.className = 'month-btn' + (idx === currentMonth ? ' active' : '');
            btn.textContent = isKh ? m : englishMonths[idx].substring(0, 3);
            btn.onclick = () => selectMonth(idx);
            monthGrid.appendChild(btn);
        });
        
        holidayList.innerHTML = '';
        const monthHolidays = holidays.filter(h => h.month === currentMonth + 1);
        if (monthHolidays.length === 0) {
            holidayList.innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">No holidays</div>';
        } else {
            monthHolidays.forEach(h => {
                const item = document.createElement('div');
                item.className = 'holiday-item';
                item.innerHTML = '<span class="date">' + h.day + '/' + h.month + '</span> ' + (isKh ? h.name_kh : (h.name_en || h.name_kh));
                holidayList.appendChild(item);
            });
        }
    }
    
    render();
</script>
{% endblock %}
