{% extends 'base.html' %}

{% block title %}Cambodia Calendar{% endblock %}

{% block extra_css %}
<style>
    .calendar-page {
        display: flex;
        flex-direction: column;
        min-height: calc(100vh - 60px);
        padding: 20px;
        gap: 20px;
    }
    
    .calendar-page .main-content {
        display: flex;
        gap: 24px;
        flex: 1;
    }
    
    .left-panel {
        flex: 0 0 320px;
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
    }
    
    .right-panel {
        flex: 1;
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    
    .calendar-section {
        flex: 1;
        overflow: auto;
    }
    
    .buddha-section {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 2px solid #eee;
    }
    
    .left-panel h2 {
        color: #333;
        margin-bottom: 20px;
        font-size: 20px;
        text-align: center;
    }
    
    .year-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 20px;
    }
    
    .year-nav button {
        background: #667eea;
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
    }
    
    .year-nav span {
        font-size: 26px;
        font-weight: 700;
        min-width: 80px;
        text-align: center;
    }
    
    .month-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 20px;
    }
    
    .month-btn {
        padding: 12px;
        background: #f5f5f5;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Kantumruy Pro', sans-serif;
        font-size: 14px;
    }
    
    .month-btn:hover { background: #e0e0e0; }
    .month-btn.active { background: #d32f2f; color: white; }
    
    .holiday-section h3 {
        color: #333;
        margin-bottom: 12px;
        font-size: 18px;
    }
    
    .holiday-list {
        max-height: 200px;
        overflow-y: auto;
    }
    
    .holiday-item {
        padding: 12px;
        background: #ffcdd2;
        border-radius: 8px;
        margin-bottom: 10px;
        font-size: 15px;
    }
    
    .holiday-item .date {
        font-weight: 600;
        color: #c62828;
    }
    
    .lang-buttons {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        justify-content: flex-end;
    }
    
    .lang-btn {
        padding: 10px 20px;
        border: 2px solid #667eea;
        background: white;
        color: #667eea;
        border-radius: 20px;
        cursor: pointer;
        font-weight: 600;
    }
    
    .lang-btn.active { background: #667eea; color: white; }
    
    .month-title {
        text-align: center;
        font-size: 26px;
        font-weight: 700;
        color: #333;
        margin-bottom: 20px;
    }
    
    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
    }
    
    .day-header {
        text-align: center;
        padding: 12px;
        font-weight: 700;
        color: #666;
        font-size: 14px;
    }
    
    .calendar-day {
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.2s;
    }
    
    .calendar-day:hover {
        transform: scale(1.05);
    }
    
    .calendar-day.today { background: #d32f2f; color: white; }
    .calendar-day.holiday { background: #ffcdd2; color: #c62828; }
    .calendar-day.saturday, .calendar-day.sunday { background: #ffebee; color: #c62828; }
    .calendar-day.selected { border: 3px solid #667eea; }
    
    .calendar-day .khmer-day { font-size: 12px; opacity: 0.7; margin-top: 4px; }
    .calendar-day.today .khmer-day { color: white; }
    
    .buddha-calendar {
        display: none;
        padding: 20px;
        background: #fafafa;
        border-radius: 12px;
        margin-top: 10px;
    }
    
    .buddha-calendar.visible {
        display: block;
    }
    
    .buddha-calendar h4 {
        color: #333;
        margin-bottom: 15px;
        font-size: 18px;
    }
    
    .buddha-info {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }
    
    .buddha-item {
        padding: 12px;
        background: white;
        border-radius: 8px;
        font-size: 14px;
    }
    
    .buddha-item label {
        font-weight: 600;
        color: #666;
        display: block;
        margin-bottom: 4px;
    }
    
    @media (max-width: 900px) {
        .calendar-page .main-content { flex-direction: column; }
        .left-panel { flex: none; }
    }
    
    @media (max-width: 600px) {
        .left-panel { padding: 16px; }
        .right-panel { padding: 16px; }
        .calendar-grid { gap: 4px; }
        .calendar-day { font-size: 13px; }
        .month-title { font-size: 20px; }
    }
</style>
{% endblock %}

{% block content %}
<div class="calendar-page">
    <div class="main-content">
        <div class="left-panel">
            <div class="year-nav">
                <button onclick="changeYear(-1)">◀</button>
                <span id="yearDisplay">{{ current_year }}</span>
                <button onclick="changeYear(1)">▶</button>
            </div>
            
            <div class="month-grid" id="monthGrid"></div>
            
            <div class="holiday-section">
                <h3 id="holidayTitle"> ថ្ងៃឈប់សម្រាក</h3>
                <div class="holiday-list" id="holidayList"></div>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="lang-buttons">
                <button class="lang-btn" id="langEn" onclick="setLang('en')">EN</button>
                <button class="lang-btn active" id="langKh" onclick="setLang('kh')">KH</button>
            </div>
            
            <div class="calendar-section">
                <div class="month-title" id="monthTitle"></div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
            
            <div class="buddha-section">
                <div class="buddha-calendar" id="buddhaCalendar">
                    <h4 id="buddhaTitle"> ប្រតិទិនបង្គំ</h4>
                    <div class="buddha-info">
                        <div class="buddha-item">
                            <label>Year (B.E.)</label>
                            <span id="buddhaYear">2569</span>
                        </div>
                        <div class="buddha-item">
                            <label>Year (C.E.)</label>
                            <span id="ceYear">2026</span>
                        </div>
                        <div class="buddha-item">
                            <label>Month</label>
                            <span id="buddhaMonth"> មេសា</span>
                        </div>
                        <div class="buddha-item">
                            <label>Day</label>
                            <span id="buddhaDay"> ច័ន្ទ</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const khmerMonths = ['មករា', 'កុម្ភៈ', 'មីនា', 'មេសា', ' ឧសភា', ' មិថុនា', ' កក្កដា', ' សីហា', ' កញ្ញា', ' តុលា', ' វិចិ្ឆកា', ' ធ្នូ'];
    const englishMonths = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const khmerDays = ['ច័ន្ទ', 'អង្គារ', 'ពុធ', 'ព្រហស្បតិ៍', 'សុក្រ', 'សៅរ៍', 'អាទិត្យ'];
    const englishDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    
    let holidays = {{ holidays|safe }};
    let currentYear = {{ current_year }};
    let currentMonth = new Date().getMonth();
    let selectedDay = null;
    let currentLang = localStorage.getItem('pdf_lang') || 'kh';
    
    function setLang(lang) {
        currentLang = lang;
        if (lang === 'kh') {
            document.body.className = 'lang-kh';
            document.getElementById('langKh').classList.add('active');
            document.getElementById('langEn').classList.remove('active');
        } else {
            document.body.className = 'lang-en';
            document.getElementById('langEn').classList.add('active');
            document.getElementById('langKh').classList.remove('active');
        }
        localStorage.setItem('pdf_lang', lang);
        render();
    }
    
    setLang(currentLang);
    
    function changeYear(delta) {
        currentYear += delta;
        document.getElementById('yearDisplay').textContent = currentYear;
        render();
    }
    
    function selectMonth(m) {
        currentMonth = m;
        render();
    }
    
    function getBuddhaYear(ceYear) {
        return ceYear + 543;
    }
    
    function showBuddhaCalendar(day, month, year) {
        const buddhaDiv = document.getElementById('buddhaCalendar');
        const isKh = currentLang === 'kh';
        
        document.getElementById('buddhaTitle').textContent = isKh ? ' ប្រតិទិនបង្គំ' : 'Buddha Calendar';
        document.getElementById('buddhaYear').textContent = getBuddhaYear(year);
        document.getElementById('ceYear').textContent = year;
        document.getElementById('buddhaMonth').textContent = isKh ? khmerMonths[month] : englishMonths[month];
        document.getElementById('buddhaDay').textContent = isKh ? khmerDays[day] : englishDays[day];
        
        buddhaDiv.classList.add('visible');
    }
    
    function render() {
        const isKh = currentLang === 'kh';
        
        document.getElementById('monthTitle').textContent = (isKh ? khmerMonths[currentMonth] : englishMonths[currentMonth]) + ' ' + currentYear;
        document.getElementById('holidayTitle').textContent = isKh ? ' ថ្ងៃឈប់សម្រាក' : 'Holidays';
        
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        
        const headers = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        headers.forEach(d => {
            const h = document.createElement('div');
            h.className = 'day-header';
            h.textContent = isKh ? khmerDays[headers.indexOf(d)] : d;
            grid.appendChild(h);
        });
        
        const first = new Date(currentYear, currentMonth, 1);
        const days = new Date(currentYear, currentMonth + 1, 0).getDate();
        let start = first.getDay();
        start = start === 0 ? 6 : start - 1;
        
        const today = new Date();
        
        for (let i = 0; i < start + days; i++) {
            const dayNum = i - start + 1;
            if (dayNum < 1 || dayNum > days) {
                grid.appendChild(document.createElement('div'));
                continue;
            }
            
            const div = document.createElement('div');
            div.className = 'calendar-day';
            const dow = new Date(currentYear, currentMonth, dayNum).getDay();
            const hol = holidays.find(h => h.day === dayNum && h.month === currentMonth + 1);
            
            if (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === dayNum) {
                div.classList.add('today');
            } else if (hol) {
                div.classList.add('holiday');
            } else if (dow === 6 || dow === 0) {
                div.classList.add(dow === 6 ? 'saturday' : 'sunday');
            }
            
            if (selectedDay === dayNum) {
                div.classList.add('selected');
            }
            
            div.onclick = function() {
                selectedDay = dayNum;
                showBuddhaCalendar(dow, currentMonth, currentYear);
                render();
            };
            
            div.innerHTML = dayNum + '<span class="khmer-day">' + khmerDays[dow] + '</span>';
            grid.appendChild(div);
        }
        
        const monthGrid = document.getElementById('monthGrid');
        monthGrid.innerHTML = '';
        khmerMonths.forEach((m, i) => {
            const btn = document.createElement('button');
            btn.className = 'month-btn' + (i === currentMonth ? ' active' : '');
            btn.textContent = isKh ? m : englishMonths[i].substring(0, 3);
            btn.onclick = () => selectMonth(i);
            monthGrid.appendChild(btn);
        });
        
        const holidayList = document.getElementById('holidayList');
        const monthHols = holidays.filter(h => h.month === currentMonth + 1);
        
        if (monthHols.length === 0) {
            holidayList.innerHTML = '<div style="color: #999; text-align: center; padding: 15px;">' + (isKh ? 'គ្មានថ្ងៃឈប់' : 'No holidays') + '</div>';
        } else {
            holidayList.innerHTML = monthHols.map(h => 
                '<div class="holiday-item"><span class="date">' + h.day + '/' + h.month + '</span> ' + (isKh ? h.name_kh : h.name_en) + '</div>'
            ).join('');
        }
    }
    
    render();
</script>
{% endblock %}
