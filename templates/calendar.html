{% extends 'base.html' %}

{% block title %}Cambodia Calendar - Khmer PDF Tools{% endblock %}

{% block extra_css %}
<style>
    .calendar-wrapper {
        background: white;
        border-radius: 16px;
        padding: 24px;
        margin: 20px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    
    .calendar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    
    .year-nav {
        display: flex;
        align-items: center;
        gap: 15px;
    }
    
    .year-nav button {
        background: #667eea;
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
    }
    
    .year-nav span {
        font-size: 24px;
        font-weight: 700;
        min-width: 100px;
        text-align: center;
    }
    
    .month-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 20px;
    }
    
    .month-btn {
        padding: 12px;
        background: #f5f5f5;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-family: 'Kantumruy Pro', sans-serif;
    }
    
    .month-btn:hover { background: #e0e0e0; }
    .month-btn.active { background: #d32f2f; color: white; }
    
    .holiday-list {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #eee;
    }
    
    .holiday-list h3 { margin-bottom: 10px; color: #333; }
    
    .holiday-item {
        padding: 10px;
        background: #ffcdd2;
        border-radius: 8px;
        margin-bottom: 8px;
    }
    
    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
    }
    
    .day-header {
        text-align: center;
        padding: 10px;
        font-weight: 700;
        color: #666;
    }
    
    .calendar-day {
        aspect-ratio: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
        border-radius: 8px;
        font-size: 16px;
    }
    
    .calendar-day.today { background: #d32f2f; color: white; }
    .calendar-day.holiday { background: #ffcdd2; color: #c62828; }
    .calendar-day.saturday, .calendar-day.sunday { background: #ffebee; color: #c62828; }
    
    .calendar-day .khmer { font-size: 10px; color: #999; }
    .calendar-day.today .khmer { color: white; }
    
    .month-title {
        text-align: center;
        font-size: 24px;
        font-weight: 700;
        color: #333;
        margin-bottom: 20px;
    }
    
    .lang-btn {
        background: white;
        border: 2px solid #667eea;
        color: #667eea;
        padding: 8px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: 600;
    }
    .lang-btn.active { background: #667eea; color: white; }
    
    @media (max-width: 900px) {
        .calendar-wrapper { margin: 10px; padding: 16px; }
        .calendar-grid { gap: 4px; }
        .calendar-day { font-size: 14px; }
        .month-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
        .calendar-wrapper { margin: 5px; padding: 10px; }
        .month-grid { grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .month-btn { padding: 8px; font-size: 12px; }
    }
</style>
{% endblock %}

{% block content %}
<div class="calendar-wrapper">
    <div class="calendar-header">
        <div class="year-nav">
            <button onclick="changeYear(-1)">◀</button>
            <span id="yearDisplay">{{ current_year }}</span>
            <button onclick="changeYear(1)">▶</button>
        </div>
        <div>
            <button class="lang-btn" id="langEn" onclick="setLang('en')">EN</button>
            <button class="lang-btn active" id="langKh" onclick="setLang('kh')">KH</button>
        </div>
    </div>
    
    <div class="month-grid" id="monthGrid"></div>
    
    <div class="month-title" id="monthTitle"></div>
    <div class="calendar-grid" id="calendarGrid"></div>
    
    <div class="holiday-list">
        <h3> Holidays</h3>
        <div id="holidayList"></div>
    </div>
</div>

<script>
    const khmerMonths = ['មករា', 'កុម្ភៈ', 'មីនា', 'មេសា', 'ឧសភា', 'មិថុនា', 'កក្កដា', 'សីហា', 'កញ្ញា', 'តុលា', 'វិចិ្ឆកា', 'ធ្នូ'];
    const englishMonths = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const khmerDays = ['ច', 'អ', 'ព', 'ព្រ', 'ស', 'សៅ', 'អា'];
    
    let holidays = {{ holidays|safe }};
    let currentYear = {{ current_year }};
    let currentMonth = new Date().getMonth();
    
    function setLang(lang) {
        document.body.className = 'lang-' + lang;
        document.getElementById('lang' + lang.toUpperCase()).classList.add('active');
        document.getElementById('lang' + (lang === 'en' ? 'kh' : 'en')).classList.remove('active');
        localStorage.setItem('pdf_lang', lang);
        render();
    }
    
    const savedLang = localStorage.getItem('pdf_lang') || 'kh';
    setLang(savedLang);
    
    function changeYear(delta) {
        currentYear += delta;
        document.getElementById('yearDisplay').textContent = currentYear;
        render();
    }
    
    function selectMonth(m) {
        currentMonth = m;
        render();
    }
    
    function render() {
        const isKh = document.body.classList.contains('lang-kh');
        
        document.getElementById('monthTitle').textContent = (isKh ? khmerMonths[currentMonth] : englishMonths[currentMonth]) + ' ' + currentYear;
        
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        
        const headers = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        headers.forEach(d => {
            const h = document.createElement('div');
            h.className = 'day-header';
            h.textContent = d;
            grid.appendChild(h);
        });
        
        const first = new Date(currentYear, currentMonth, 1);
        const days = new Date(currentYear, currentMonth + 1, 0).getDate();
        let start = first.getDay();
        start = start === 0 ? 6 : start - 1;
        
        const today = new Date();
        
        for (let i = 0; i < start + days; i++) {
            const dayNum = i - start + 1;
            if (dayNum < 1 || dayNum > days) {
                grid.appendChild(document.createElement('div'));
                continue;
            }
            
            const div = document.createElement('div');
            div.className = 'calendar-day';
            const dow = new Date(currentYear, currentMonth, dayNum).getDay();
            const hol = holidays.find(h => h.day === dayNum && h.month === currentMonth + 1);
            
            if (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === dayNum) div.classList.add('today');
            else if (hol) div.classList.add('holiday');
            else if (dow === 6 || dow === 0) div.classList.add(dow === 6 ? 'saturday' : 'sunday');
            
            div.innerHTML = dayNum + '<span class="khmer">' + khmerDays[dow] + '</span>';
            grid.appendChild(div);
        }
        
        const monthGrid = document.getElementById('monthGrid');
        monthGrid.innerHTML = '';
        khmerMonths.forEach((m, i) => {
            const btn = document.createElement('button');
            btn.className = 'month-btn' + (i === currentMonth ? ' active' : '');
            btn.textContent = isKh ? m : englishMonths[i].substring(0, 3);
            btn.onclick = () => selectMonth(i);
            monthGrid.appendChild(btn);
        });
        
        const holidayList = document.getElementById('holidayList');
        const monthHols = holidays.filter(h => h.month === currentMonth + 1);
        holidayList.innerHTML = monthHols.length ? monthHols.map(h => 
            '<div class="holiday-item">' + h.day + '/' + h.month + ' - ' + (isKh ? h.name_kh : h.name_en) + '</div>'
        ).join('') : '<div style="color:#999">No holidays</div>';
    }
    
    render();
</script>
{% endblock %}

{% block content %}
<div class="calendar-container">
    <div class="left-panel">
        <div class="year-nav">
            <button onclick="changeYear(-1)">◀</button>
            <span id="yearDisplay">{{ current_year }}</span>
            <button onclick="changeYear(1)">▶</button>
        </div>
        
        <div class="month-grid" id="monthGrid"></div>
        
        <div class="holiday-section">
            <h3>
                <span class="text-en">Holidays</span>
                <span class="text-kh">ថ្ងៃឈប់សម្រាក</span>
            </h3>
            <div class="holiday-list" id="holidayList"></div>
        </div>
    </div>
    
    <div class="right-panel">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
            <button class="lang-btn" id="langEn" onclick="setLang('en')">EN</button>
            <button class="lang-btn active" id="langKh" onclick="setLang('kh')">KH</button>
        </div>
        <div class="month-title" id="monthTitle"></div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>
</div>

<script>
    const khmerMonths = ['មករា', 'កុម្ភៈ', 'មីនា', 'មេសា', 'ឧសភា', 'មិថុនា', 'កក្កដា', 'សីហា', 'កញ្ញា', 'តុលា', 'វិចិ្ឆកា', 'ធ្នូ'];
    const englishMonths = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const khmerDays = ['ច', 'អ', 'ព', 'ព្រ', 'ស', 'សៅ', 'អា'];
    
    let holidays = {{ holidays|safe }};
    console.log('Holidays:', holidays);
    console.log('Current Year:', {{ current_year }});
    let currentYear = {{ current_year }};
    let currentMonth = new Date().getMonth();
    
    function setLang(lang) {
        if (lang === 'kh') {
            document.body.className = 'lang-kh';
            document.getElementById('langKh').classList.add('active');
            document.getElementById('langEn').classList.remove('active');
        } else {
            document.body.className = 'lang-en';
            document.getElementById('langEn').classList.add('active');
            document.getElementById('langKh').classList.remove('active');
        }
        localStorage.setItem('pdf_lang', lang);
        render();
    }
    
    const savedLang = localStorage.getItem('pdf_lang') || 'kh';
    setLang(savedLang);
    
    function changeYear(delta) {
        currentYear += delta;
        document.getElementById('yearDisplay').textContent = currentYear;
        render();
    }
    
    function selectMonth(m) {
        currentMonth = m;
        render();
    }
    
    function render() {
        const grid = document.getElementById('calendarGrid');
        const monthGrid = document.getElementById('monthGrid');
        const holidayList = document.getElementById('holidayList');
        const monthTitle = document.getElementById('monthTitle');
        
        const isKh = document.body.classList.contains('lang-kh');
        
        monthTitle.textContent = (isKh ? khmerMonths[currentMonth] : englishMonths[currentMonth]) + ' ' + currentYear;
        
        grid.innerHTML = '';
        const headers = isKh ? ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] : ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        headers.forEach(day => {
            const div = document.createElement('div');
            div.className = 'day-header';
            div.textContent = day;
            grid.appendChild(div);
        });
        
        const firstOfMonth = new Date(currentYear, currentMonth, 1);
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        let startDay = firstOfMonth.getDay();
        startDay = startDay === 0 ? 6 : startDay - 1;
        
        const today = new Date();
        
        for (let i = 0; i < startDay + daysInMonth; i++) {
            const dayNum = i - startDay + 1;
            
            if (dayNum < 1 || dayNum > daysInMonth) {
                const empty = document.createElement('div');
                grid.appendChild(empty);
                continue;
            }
            
            const div = document.createElement('div');
            div.className = 'calendar-day';
            
            const dayOfWeek = new Date(currentYear, currentMonth, dayNum).getDay();
            const holiday = holidays.find(h => h.day === dayNum && h.month === currentMonth + 1);
            
            if (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === dayNum) {
                div.classList.add('today');
            } else if (holiday) {
                div.classList.add('holiday');
            } else if (dayOfWeek === 6 || dayOfWeek === 0) {
                div.classList.add(dayOfWeek === 6 ? 'saturday' : 'sunday');
            }
            
            div.innerHTML = '<span class="day-number">' + dayNum + '</span><span class="khmer-day">' + khmerDays[dayOfWeek] + '</span>';
            grid.appendChild(div);
        }
        
        monthGrid.innerHTML = '';
        khmerMonths.forEach((m, idx) => {
            const btn = document.createElement('button');
            btn.className = 'month-btn' + (idx === currentMonth ? ' active' : '');
            btn.textContent = isKh ? m : englishMonths[idx].substring(0, 3);
            btn.onclick = () => selectMonth(idx);
            monthGrid.appendChild(btn);
        });
        
        holidayList.innerHTML = '';
        const monthHolidays = holidays.filter(h => h.month === currentMonth + 1);
        if (monthHolidays.length === 0) {
            holidayList.innerHTML = '<div style="color: #999; text-align: center; padding: 20px;">No holidays</div>';
        } else {
            monthHolidays.forEach(h => {
                const item = document.createElement('div');
                item.className = 'holiday-item';
                item.innerHTML = '<span class="date">' + h.day + '/' + h.month + '</span> ' + (isKh ? h.name_kh : (h.name_en || h.name_kh));
                holidayList.appendChild(item);
            });
        }
    }
    
    render();
</script>
{% endblock %}
