{% extends 'base.html' %}

{% block title %}Cambodia Calendar{% endblock %}

{% block extra_css %}
<style>
    .calendar-page {
        display: flex;
        flex-direction: column;
        padding: 24px;
        gap: 24px;
        width: 100%;
    }
    
    .calendar-page .main-content {
        display: flex;
        gap: 24px;
        width: 100%;
    }
    
    .left-panel {
        width: 340px;
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }
    
    .right-panel {
        flex: 1;
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }
    
    .year-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin-bottom: 24px;
    }
    
    .year-nav button {
        background: #2563eb;
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 18px;
    }
    
    .year-nav span {
        font-size: 28px;
        font-weight: 700;
        min-width: 100px;
        text-align: center;
    }
    
    .month-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 24px;
    }
    
    .month-btn {
        padding: 12px;
        background: #f1f5f9;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Kantumruy Pro', sans-serif;
        font-size: 14px;
    }
    
    .month-btn:hover { background: #e2e8f0; }
    .month-btn.active { background: #2563eb; color: white; }
    
    .holiday-section h3 {
        color: #1e293b;
        margin-bottom: 12px;
        font-size: 16px;
        font-weight: 600;
    }
    
    .holiday-list {
        max-height: 220px;
        overflow-y: auto;
    }
    
    .holiday-item {
        padding: 12px;
        background: #fef2f2;
        border-radius: 8px;
        margin-bottom: 8px;
        font-size: 14px;
        border-left: 3px solid #ef4444;
    }
    
    .holiday-item .date {
        font-weight: 600;
        color: #dc2626;
    }
    
    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
    }
    
    .day-header {
        text-align: center;
        padding: 10px;
        font-weight: 600;
        color: #64748b;
        font-size: 12px;
    }
    
    .calendar-day {
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f1f5f9;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .calendar-day:hover {
        background: #e2e8f0;
    }
    
    .calendar-day.today { background: #2563eb; color: white; }
    .calendar-day.holiday { background: #fef2f2; color: #dc2626; }
    .calendar-day.saturday, .calendar-day.sunday { background: #faf5ff; color: #7c3aed; }
    .calendar-day.selected { border: 2px solid #2563eb; }
    
    .day-info-section {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #e2e8f0;
    }
    
    .day-info {
        display: none;
        padding: 20px;
        background: #f8fafc;
        border-radius: 12px;
    }
    
    .day-info.visible {
        display: block;
    }
    
    .day-info h4 {
        color: #1e293b;
        margin-bottom: 16px;
        font-size: 18px;
    }
    
    .day-info-row {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid #e2e8f0;
    }
    
    .day-info-row:last-child {
        border-bottom: none;
    }
    
    .day-info-label {
        color: #64748b;
        font-weight: 500;
    }
    
    .day-info-value {
        color: #1e293b;
        font-weight: 600;
    }
    
    @media (max-width: 900px) {
        .calendar-page .main-content { flex-direction: column; }
        .left-panel { width: 100%; }
    }
</style>
{% endblock %}

{% block content %}
<div class="calendar-page">
    <div class="main-content">
        <div class="left-panel">
            <div class="year-nav">
                <button onclick="changeYear(-1)">◀</button>
                <span id="yearDisplay">{{ current_year }}</span>
                <button onclick="changeYear(1)">▶</button>
            </div>
            
            <div class="month-grid" id="monthGrid"></div>
            
            <div class="holiday-section">
                <h3 id="holidayTitle">Holidays</h3>
                <div class="holiday-list" id="holidayList"></div>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="calendar-grid" id="calendarGrid"></div>
            
            <div class="day-info-section">
                <div class="day-info" id="dayInfo">
                    <h4 id="dayInfoTitle">Day Information</h4>
                    <div class="day-info-row">
                        <span class="day-info-label">Date:</span>
                        <span class="day-info-value" id="dayInfoDate">-</span>
                    </div>
                    <div class="day-info-row">
                        <span class="day-info-label">Day:</span>
                        <span class="day-info-value" id="dayInfoDay">-</span>
                    </div>
                    <div class="day-info-row">
                        <span class="day-info-label">Buddhist Year:</span>
                        <span class="day-info-value" id="dayInfoBuddha">-</span>
                    </div>
                    <div class="day-info-row">
                        <span class="day-info-label">Holiday:</span>
                        <span class="day-info-value" id="dayInfoHoliday">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const khmerMonths = ['មករា', 'កុម្ភៈ', 'មីនា', 'មេសា', ' ឧសភា', ' មិថុនា', ' កក្កដា', ' សីហា', ' កញ្ញា', ' តុលា', ' វិចិ្ឆកា', ' ធ្នូ'];
    const englishMonths = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const khmerDays = ['ច័ន្ទ', 'អង្គារ', 'ពុធ', 'ព្រហស្បតិ៍', 'សុក្រ', 'សៅរ៍', 'អាទិត្យ'];
    const englishDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    
    let holidays = {{ holidays|safe }};
    let currentYear = {{ current_year }};
    let currentMonth = new Date().getMonth();
    let selectedDay = null;
    let currentLang = localStorage.getItem('pdf_lang') || 'en';
    
    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('pdf_lang', lang);
        render();
    }
    
    setLang(currentLang);
    
    function changeYear(delta) {
        currentYear += delta;
        document.getElementById('yearDisplay').textContent = currentYear;
        render();
    }
    
    function selectMonth(m) {
        currentMonth = m;
        render();
    }
    
    function getBuddhaYear(ceYear) {
        return ceYear + 543;
    }
    
    function showDayInfo(day, month, year) {
        const dayInfo = document.getElementById('dayInfo');
        const isKh = currentLang === 'kh';
        const dow = new Date(year, month, day).getDay();
        const hol = holidays.find(h => h.day === day && h.month === month + 1);
        
        document.getElementById('dayInfoDate').textContent = day + ' ' + (isKh ? khmerMonths[month] : englishMonths[month]) + ' ' + year;
        document.getElementById('dayInfoDay').textContent = isKh ? khmerDays[dow] : englishDays[dow];
        document.getElementById('dayInfoBuddha').textContent = getBuddhaYear(year);
        document.getElementById('dayInfoHoliday').textContent = hol ? (isKh ? hol.name_kh : hol.name_en) : (isKh ? 'គ្មាន' : 'None');
        
        dayInfo.classList.add('visible');
    }
    
    function render() {
        const isKh = currentLang === 'kh';
        
        document.getElementById('holidayTitle').textContent = isKh ? ' ថ្ងៃឈប់សម្រាក' : 'Holidays';
        
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        
        const headers = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        headers.forEach(d => {
            const h = document.createElement('div');
            h.className = 'day-header';
            h.textContent = isKh ? khmerDays[headers.indexOf(d)] : d;
            grid.appendChild(h);
        });
        
        const first = new Date(currentYear, currentMonth, 1);
        const days = new Date(currentYear, currentMonth + 1, 0).getDate();
        let start = first.getDay();
        start = start === 0 ? 6 : start - 1;
        
        const today = new Date();
        
        for (let i = 0; i < start + days; i++) {
            const dayNum = i - start + 1;
            if (dayNum < 1 || dayNum > days) {
                grid.appendChild(document.createElement('div'));
                continue;
            }
            
            const div = document.createElement('div');
            div.className = 'calendar-day';
            const dow = new Date(currentYear, currentMonth, dayNum).getDay();
            const hol = holidays.find(h => h.day === dayNum && h.month === currentMonth + 1);
            
            if (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === dayNum) {
                div.classList.add('today');
            } else if (hol) {
                div.classList.add('holiday');
            } else if (dow === 6 || dow === 0) {
                div.classList.add(dow === 6 ? 'saturday' : 'sunday');
            }
            
            if (selectedDay === dayNum) {
                div.classList.add('selected');
            }
            
            div.onclick = function() {
                selectedDay = dayNum;
                showDayInfo(dow, currentMonth, currentYear);
                render();
            };
            
            div.textContent = dayNum;
            grid.appendChild(div);
        }
        
        const monthGrid = document.getElementById('monthGrid');
        monthGrid.innerHTML = '';
        khmerMonths.forEach((m, i) => {
            const btn = document.createElement('button');
            btn.className = 'month-btn' + (i === currentMonth ? ' active' : '');
            btn.textContent = isKh ? m : englishMonths[i].substring(0, 3);
            btn.onclick = () => selectMonth(i);
            monthGrid.appendChild(btn);
        });
        
        const holidayList = document.getElementById('holidayList');
        const monthHols = holidays.filter(h => h.month === currentMonth + 1);
        
        if (monthHols.length === 0) {
            holidayList.innerHTML = '<div style="color: #94a3b8; padding: 12px;">' + (isKh ? 'គ្មានថ្ងៃឈប់' : 'No holidays this month') + '</div>';
        } else {
            holidayList.innerHTML = monthHols.map(h => 
                '<div class="holiday-item"><span class="date">' + h.day + '/' + h.month + '</span> ' + (isKh ? h.name_kh : h.name_en) + '</div>'
            ).join('');
        }
    }
    
    render();
</script>
{% endblock %}
