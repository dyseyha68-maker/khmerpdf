<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Khmer PDF Tools</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Kantumruy Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        
        .success-icon { font-size: 72px; margin-bottom: 20px; }
        
        .thank-you-text { 
            font-size: 26px; 
            color: #333; 
            margin-bottom: 8px; 
            font-weight: 700;
        }
        
        .sub-text { 
            color: #666; 
            font-size: 15px; 
            margin-bottom: 24px;
        }
        
        .qr-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .qr-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }
        
        .qr-image {
            width: 200px;
            height: 240px;
            margin-bottom: 12px;
        }
        
        .amount-btns {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        
        .amount-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Kantumruy Pro', sans-serif;
        }
        .amount-btn:hover { transform: scale(1.05); }
        
        .donate-text {
            font-size: 13px;
            color: #666;
            margin-bottom: 24px;
        }
        
        .download-btn {
            display: block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .download-btn:hover { transform: translateY(-2px); }
        
        .home-btn {
            display: inline-block;
            background: #f5f5f5;
            color: #333;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
        }
        .home-btn:hover { background: #e0e0e0; }
        
        .text-en, .text-kh { display: none; }
        body.lang-en .text-en { display: block; }
        body.lang-kh .text-kh { display: block; }
        
        @media (max-width: 480px) {
            .container { padding: 20px 15px; }
            .amount-btn { padding: 8px 12px; font-size: 14px; }
            .qr-section { padding: 12px; }
            .qr-image { width: 160px; height: 190px; }
            .download-btn { padding: 12px 20px; font-size: 14px; }
            .home-btn { padding: 10px 16px; font-size: 13px; }
            .success-icon { font-size: 48px; }
            .thank-you-text { font-size: 20px; }
        }
        
        @media (max-width: 350px) {
            .container { padding: 15px 10px; }
            .qr-image { width: 140px; height: 170px; }
            .amount-btns { gap: 4px; }
            .amount-btn { padding: 6px 10px; font-size: 12px; }
        }
    </style>
    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            localStorage.setItem('pdf_lang', lang);
        }
        const savedLang = localStorage.getItem('pdf_lang') || 'kh';
        setLang(savedLang);
    </script>
</head>
<body class="lang-kh">
    <div class="container">
        <div class="success-icon">✅</div>
        <h1 class="thank-you-text">
            <span class="text-en">Thank You!</span>
            <span class="text-kh">អរគុណ!</span>
        </h1>
        <p class="sub-text">
            <span class="text-en">Your file has been processed successfully.</span>
            <span class="text-kh">ឯកសាររបស់អ្នកត្រូវបានដំណើរការដោយជោគជ័យ។</span>
        </p>
        
        <div class="qr-section">
            <div class="qr-title">
                <span class="text-en">Support Us with QR Code</span>
                <span class="text-kh">គេហទំព័ររបស់យើងជាមួយ QR Code</span>
            </div>
{% load static %}
            <img src="{% static 'khqr.jpg' %}" alt="QR Code" class="qr-image">
            <div class="amount-btns">
                <button class="amount-btn">$0.5</button>
                <button class="amount-btn">$1</button>
                <button class="amount-btn">$2</button>
                <button class="amount-btn">$5</button>
                <button class="amount-btn">$10</button>
            </div>
            <p class="donate-text">
                <span class="text-en">Any donation is appreciated! 🙏</span>
                <span class="text-kh">ការបរិច្ចាកណាមួយគឺស្រលាញ់! 🙏</span>
            </p>
        </div>
        
        <a href="{{ download_url }}" class="download-btn" download>
            <span class="text-en">📥 Download File</span>
            <span class="text-kh">📥 ទាញយកឯកសារ</span>
        </a>
        
        <a href="/" class="home-btn">
            <span class="text-en">🏠 Back to Home</span>
            <span class="text-kh">🏠 ត្រឡប់ទៅដើម</span>
        </a>
    </div>
</body>
</html>
