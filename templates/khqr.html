<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Khmer PDF Tools</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Kantumruy Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 48px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .success-icon { font-size: 72px; margin-bottom: 24px; }
        
        .thank-you-text { 
            font-size: 28px; 
            color: #333; 
            margin-bottom: 12px; 
            font-weight: 700;
        }
        
        .sub-text { 
            color: #666; 
            font-size: 16px; 
            margin-bottom: 32px;
        }
        
        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
        }
        .download-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .home-btn {
            display: inline-block;
            background: #f5f5f5;
            color: #333;
            padding: 18px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            margin-left: 12px;
            transition: all 0.3s;
        }
        .home-btn:hover { background: #e0e0e0; }
        
        .text-en, .text-kh { display: none; }
        body.lang-en .text-en { display: block; }
        body.lang-kh .text-kh { display: block; }
        
        @media (max-width: 600px) {
            .container { padding: 32px 24px; }
            .thank-you-text { font-size: 24px; }
            .download-btn, .home-btn { 
                display: block; 
                width: 100%; 
                margin: 10px 0 0 0; 
            }
        }
    </style>
    <script>
        function setLang(lang) {
            document.body.className = 'lang-' + lang;
            localStorage.setItem('pdf_lang', lang);
        }
        const savedLang = localStorage.getItem('pdf_lang') || 'kh';
        setLang(savedLang);
    </script>
</head>
<body class="lang-kh">
    <div class="container">
        <div class="success-icon">✅</div>
        <h1 class="thank-you-text">
            <span class="text-en">Thank You!</span>
            <span class="text-kh">អរគុណ!</span>
        </h1>
        <p class="sub-text">
            <span class="text-en">Your file has been processed successfully.</span>
            <span class="text-kh">ឯកសាររបស់អ្នកត្រូវបានដំណើរការដោយជោគជ័យ។</span>
        </p>
        
        <a href="{{ download_url }}" class="download-btn" download>
            <span class="text-en">📥 Download File</span>
            <span class="text-kh">📥 ទាញយកឯកសារ</span>
        </a>
        
        <a href="/" class="home-btn">
            <span class="text-en">🏠 Back to Home</span>
            <span class="text-kh">🏠 ត្រឡប់ទៅដើម</span>
        </a>
    </div>
</body>
</html>
